<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOTEPAD NESTOR</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#050816;
color:white;
padding:20px;
}

.header{
text-align:center;
font-size:26px;
font-weight:bold;
padding:15px;
background:linear-gradient(90deg,#0a1638,#0e3e9d);
border-radius:12px;
margin-bottom:15px;
}

#search{
width:100%;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

.add-box{
background:#081122;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

.add-box input,
.add-box textarea{
width:100%;
margin-bottom:10px;
padding:10px;
border-radius:8px;
}

button{
padding:8px;
border:none;
border-radius:8px;
cursor:pointer;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:10px;
}

.section{
background:#081122;
padding:10px;
border-radius:10px;
}

.section-title{
background:white;
color:black;
padding:8px;
border-radius:6px;
text-align:center;
margin-bottom:10px;
}

.card{
background:black;
padding:10px;
border-radius:10px;
margin-bottom:10px;
position:relative;
}

.copy-btn{
position:absolute;
right:10px;
bottom:10px;
background:#00aaff;
color:white;
}

</style>
</head>

<body>

<div class="header">📝 NOTEPAD NESTOR</div>

<input id="search" placeholder="Cari...">

<div class="add-box">
<input id="title" placeholder="Kategori">
<textarea id="text" placeholder="Isi"></textarea>
<button onclick="addTemplate()">+ TAMBAH</button>
</div>

<div class="container" id="container"></div>

<script>

let data = JSON.parse(localStorage.getItem("notes")) || [];

function render(){
let container = document.getElementById("container");
container.innerHTML = "";

data.forEach((item,i)=>{
container.innerHTML += `
<div class="section">
<div class="section-title">${item.title}</div>

<div class="card">
${item.text}
<button class="copy-btn" onclick="copyText(${i})">COPY</button>
</div>

</div>
`;
});
}

render();

function addTemplate(){
let title = document.getElementById("title").value;
let text = document.getElementById("text").value;

if(!title || !text) return alert("isi dulu");

data.push({title,text});
localStorage.setItem("notes", JSON.stringify(data));

document.getElementById("title").value="";
document.getElementById("text").value="";

render();
}

function copyText(i){
navigator.clipboard.writeText(data[i].text);
alert("copied");
}

document.getElementById("search").addEventListener("input",function(){
let val = this.value.toLowerCase();
document.querySelectorAll(".section").forEach(el=>{
el.style.display = el.innerText.toLowerCase().includes(val)
? "block":"none";
});
});

</script>

</body>
</html>
