<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notepad Nestor</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#0b1020;
color:white;
padding:15px;
}

/* HEADER */
.header{
text-align:center;
font-size:24px;
font-weight:bold;
padding:12px;
background:#1c2a4a;
border-radius:12px;
margin-bottom:15px;
}

/* INPUT */
#search, #title, #text{
width:100%;
padding:10px;
margin-bottom:8px;
border:none;
border-radius:8px;
outline:none;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#2f80ed;
color:white;
font-weight:bold;
cursor:pointer;
}

/* CONTAINER */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:10px;
margin-top:15px;
}

/* CARD */
.section{
background:#151d33;
padding:10px;
border-radius:12px;
border:1px solid #2a3a66;
}

.section-title{
background:#fff;
color:#000;
padding:6px;
border-radius:6px;
text-align:center;
font-weight:bold;
margin-bottom:8px;
}

.card{
background:#0a0f1f;
padding:10px;
border-radius:10px;
position:relative;
margin-bottom:8px;
}

.card p{
white-space:pre-line;
font-size:14px;
}

/* BUTTON */
.btn{
margin-top:5px;
padding:6px;
font-size:12px;
border-radius:6px;
}

.copy{background:#2f80ed;}
.edit{background:#f39c12;}
.del{background:#e74c3c;}

/* TOAST */
.toast{
position:fixed;
top:15px;
right:15px;
background:#27ae60;
padding:10px;
border-radius:8px;
display:none;
}
</style>
</head>

<body>

<div class="header">📝 NOTEPAD NESTOR</div>

<input id="search" placeholder="Cari template...">

<input id="title" placeholder="Kategori">
<textarea id="text" placeholder="Isi template..."></textarea>

<button onclick="add()">+ TAMBAH</button>

<div class="container" id="container"></div>

<div class="toast" id="toast">OK</div>

<script>
let data = JSON.parse(localStorage.getItem("notes")) || [];

function render(){
let c=document.getElementById("container");
c.innerHTML="";

data.forEach((d,i)=>{
c.innerHTML+=`
<div class="section"
draggable="true"
ondragstart="drag(event)"
ondragover="allow(event)"
ondrop="drop(event)"
data-i="${i}">

<div class="section-title">${d.title}</div>

<div class="card">
<p>${d.text}</p>

<button class="btn copy" onclick="copy('${i}')">COPY</button>
<button class="btn edit" onclick="edit(${i})">EDIT</button>
<button class="btn del" onclick="del(${i})">HAPUS</button>
</div>

</div>`;
});
}

function add(){
let t=document.getElementById("title").value;
let x=document.getElementById("text").value;

if(!t||!x)return alert("isi dulu");

data.push({title:t,text:x});
save();render();
}

function copy(i){
navigator.clipboard.writeText(data[i].text);
toast("Copied");
}

function edit(i){
let t=prompt("Kategori",data[i].title);
let x=prompt("Isi",data[i].text);
if(!t||!x)return;

data[i]={title:t,text:x};
save();render();
}

function del(i){
if(!confirm("hapus?"))return;
data.splice(i,1);
save();render();
}

let dragI=null;

function drag(e){
dragI=e.currentTarget.dataset.i;
}

function allow(e){e.preventDefault();}

function drop(e){
let to=e.currentTarget.dataset.i;

let item=data.splice(dragI,1)[0];
data.splice(to,0,item);

save();render();
}

function save(){
localStorage.setItem("notes",JSON.stringify(data));
}

function toast(m){
let t=document.getElementById("toast");
t.innerText=m;
t.style.display="block";
setTimeout(()=>t.style.display="none",1200);
}

document.getElementById("search").addEventListener("input",e=>{
let k=e.target.value.toLowerCase();
document.querySelectorAll(".section").forEach(s=>{
s.style.display=s.innerText.toLowerCase().includes(k)?"block":"none";
});
});

render();
</script>

</body>
</html>
