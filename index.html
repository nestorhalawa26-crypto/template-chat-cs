<script>

let data = JSON.parse(localStorage.getItem("notes")) || [];

// RENDER
function render(){

let container = document.getElementById("container");
container.innerHTML = "";

data.forEach((item,index)=>{

container.innerHTML += `
<div class="section"
draggable="true"
data-index="${index}"
ondragstart="drag(event)"
ondragover="allowDrop(event)"
ondrop="drop(event)">

<div class="section-title">${item.title}</div>

<div class="card">

<p id="t${index}">${item.text}</p>

<button class="copy-btn"
onclick="copyText('t${index}')">
COPY
</button>

<button class="copy-btn"
style="bottom:50px;background:#ff9800;"
onclick="editTemplate(${index})">
EDIT
</button>

<button class="copy-btn"
style="bottom:90px;background:#f44336;"
onclick="deleteTemplate(${index})">
HAPUS
</button>

</div>
</div>
`;

});

}

// ADD TEMPLATE
function addTemplate(){

let title = document.getElementById("title").value.trim();
let text = document.getElementById("text").value.trim();

if(!title || !text){
alert("Isi lengkap dulu!");
return;
}

data.push({title,text});

localStorage.setItem("notes", JSON.stringify(data));

document.getElementById("title").value = "";
document.getElementById("text").value = "";

render();
showToast("Template ditambahkan");

}

// EDIT
function editTemplate(index){

let newTitle = prompt("Edit Judul", data[index].title);
if(newTitle === null) return;

let newText = prompt("Edit Template", data[index].text);
if(newText === null) return;

data[index].title = newTitle;
data[index].text = newText;

localStorage.setItem("notes", JSON.stringify(data));

render();
showToast("Template diperbarui");

}

// DELETE
function deleteTemplate(index){

if(!confirm("Hapus template ini?")) return;

data.splice(index,1);

localStorage.setItem("notes", JSON.stringify(data));

render();
showToast("Template dihapus");

}

// DRAG
let dragIndex = null;

function drag(ev){
dragIndex = Number(ev.currentTarget.dataset.index);
}

function allowDrop(ev){
ev.preventDefault();
}

function drop(ev){

ev.preventDefault();

let targetIndex = Number(ev.currentTarget.dataset.index);

if(dragIndex === targetIndex) return;

let item = data.splice(dragIndex,1)[0];
data.splice(targetIndex,0,item);

localStorage.setItem("notes", JSON.stringify(data));

render();
showToast("Urutan diperbarui");

}

// COPY
function copyText(id){
let text = document.getElementById(id).innerText;
navigator.clipboard.writeText(text);
showToast("Disalin!");
}

// TOAST
function showToast(msg){
let toast = document.getElementById("toast");
toast.innerText = msg;
toast.style.display = "block";

setTimeout(()=>{
toast.style.display = "none";
},2000);
}

// SEARCH (FIX TOTAL)
document.getElementById("search").addEventListener("keyup", function(){

let keyword = this.value.toLowerCase();

let sections = document.querySelectorAll(".section");

sections.forEach(section=>{

let text = section.innerText.toLowerCase();

section.style.display = text.includes(keyword)
? "block"
: "none";

});

});

</script>
